name: 🏍️ Build MotoContable APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-debug:
    name: Compilar APK Debug
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Permisos a gradlew
        run: chmod +x gradlew

      - name: 🔨 Compilar APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: 📤 Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: MotoContable-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ Listo
        run: echo "APK generado exitosamente 🎉"
